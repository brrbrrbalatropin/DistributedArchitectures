syntax = "proto3";

option java_multiple_files = true;
option java_package = "edu.eci.arsw.microservices";
option java_outer_classname = "GymProto";

service GymService {
  rpc ReserveSession (GymRequest)    returns (GymResponse);
  rpc GetSessions    (EmptyRequest)  returns (SessionList);
}

message EmptyRequest {}

message GymRequest {
  string student_id = 1;
  string time_slot  = 2;
}

message GymResponse {
  bool   success    = 1;
  string message    = 2;
  string session_id = 3;
}

message SessionInfo {
  string session_id = 1;
  string student_id = 2;
  string time_slot  = 3;
}

message SessionList {
  repeated SessionInfo sessions = 1;
}